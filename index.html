<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODEGA MIRAMONTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .glass { background: white; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-24">

    <!-- PANTALLA CARGA / DEBUGGER -->
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-10 text-center">
        <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <h2 class="text-xl font-bold mb-2">Sincronizando...</h2>
        <p id="status-msg" class="text-gray-500 text-sm italic">Conectando con Google Sheets</p>
        <div id="error-box" class="hidden mt-4 p-4 bg-red-50 text-red-600 rounded-lg text-xs break-all"></div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="hidden min-h-screen flex flex-col items-center justify-center p-6">
        <img src="logo.png" alt="Logo" class="w-32 mb-2">
        <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">BODEGA MIRAMONTE</h1>
        <p class="mb-10 text-gray-400 font-medium">Seleccione su perfil</p>
        <div class="space-y-4 w-full max-w-xs">
            <button onclick="login('Sergio')" class="w-full glass p-5 font-bold text-lg active:bg-gray-100">Sergio</button>
            <button onclick="login('Raul')" class="w-full glass p-5 font-bold text-lg active:bg-gray-100">Raul</button>
            <button onclick="login('Romeo')" class="w-full glass p-5 font-bold text-lg active:bg-gray-100">Romeo</button>
        </div>
    </div>

    <!-- APP -->
    <div id="main-app" class="hidden">
        <header class="p-6 flex justify-between items-center bg-white shadow-sm">
            <div>
                <img src="logo.png" class="w-10">
                <h2 class="font-black text-xs text-blue-600">BODEGA MIRAMONTE</h2>
            </div>
            <div id="user-display" class="bg-blue-50 px-4 py-1 rounded-full text-blue-700 font-bold text-xs uppercase"></div>
        </header>

        <!-- BUSCADOR -->
        <main id="view-inventory" class="p-4">
            <input type="text" id="search-input" oninput="searchInDB()" placeholder="Ingresar código..." 
                class="w-full p-5 rounded-3xl shadow-lg border-none focus:ring-2 focus:ring-blue-500 outline-none text-lg font-bold">
            
            <div id="res-card" class="hidden mt-6 glass p-6 animate-fade-in border-l-[8px] border-blue-500">
                <h3 id="res-codigo" class="text-3xl font-black mb-1"></h3>
                <p id="res-desc" class="text-gray-500 text-sm mb-6"></p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <span class="text-[10px] font-bold text-gray-400 block">SISTEMA</span>
                        <span id="res-sis" class="text-xl font-bold"></span>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <span class="text-[10px] font-bold text-gray-400 block">BODEGA</span>
                        <span id="res-bod" class="text-xl font-bold"></span>
                    </div>
                </div>
                <div id="res-dif-box" class="mt-4 p-4 rounded-2xl flex justify-between items-center">
                    <span class="font-bold">DIFERENCIA</span>
                    <span id="res-dif" class="text-2xl font-black"></span>
                </div>
                <div class="mt-4 text-xs font-bold text-gray-400 flex justify-between px-2">
                    <span id="res-ub"></span>
                    <span id="res-lote"></span>
                </div>
            </div>
        </main>

        <!-- DASHBOARD (DESCUADRES) -->
        <main id="view-dash" class="hidden p-4">
            <h2 class="font-black text-xl mb-4 text-red-600">PRODUCTOS DESCUADRADOS</h2>
            <div id="dash-list" class="space-y-3"></div>
        </main>

        <!-- MOVIMIENTOS -->
        <main id="view-mov" class="hidden p-4">
            <div class="glass p-6">
                <h2 class="font-black mb-4">REGISTRAR MOVIMIENTO</h2>
                <form id="mov-form" class="space-y-4">
                    <input type="text" id="m-cod" onchange="autoFill(this.value)" placeholder="Código" class="w-full p-4 bg-gray-100 rounded-xl font-bold" required>
                    <input type="text" id="m-des" placeholder="Descripción (Automático)" class="w-full p-4 bg-gray-50 text-gray-400 rounded-xl italic" readonly>
                    <select id="m-tipo" class="w-full p-4 bg-blue-600 text-white font-bold rounded-xl">
                        <option value="ENTRADA">?? ENTRADA (+)</option>
                        <option value="SALIDA">?? SALIDA (-)</option>
                        <option value="TRASLADO">?? TRASLADO</option>
                    </select>
                    <input type="number" id="m-cant" placeholder="Cantidad" class="w-full p-4 bg-gray-100 rounded-xl font-bold">
                    <input type="text" id="m-lote" placeholder="Número de Lote" class="w-full p-4 bg-gray-100 rounded-xl font-bold">
                    <button type="submit" class="w-full bg-black text-white p-5 rounded-2xl font-black">GUARDAR EN SHEETS</button>
                </form>
            </div>
        </main>

        <!-- NAV -->
        <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4 shadow-2xl">
            <button onclick="showTab('inventory')" class="flex flex-col items-center text-blue-600"><i class="fas fa-search text-xl"></i><span class="text-[10px] font-bold">BUSCAR</span></button>
            <button onclick="showTab('dash')" class="flex flex-col items-center text-gray-400"><i class="fas fa-exclamation-triangle text-xl"></i><span class="text-[10px] font-bold">ALERTAS</span></button>
            <button onclick="showTab('mov')" class="flex flex-col items-center text-gray-400"><i class="fas fa-plus-circle text-xl"></i><span class="text-[10px] font-bold">MOVER</span></button>
        </nav>
    </div>

    <script>
        const URL_API = 'https://script.google.com/macros/s/AKfycbxrsMaMxCprVCz3mA3DxXOhVJbZUxuZUiZqHDA36FjkZy1pPVWeHMehELoP7oLocfY/exec'; // <--- PEGA AQUÍ LA URL
        let DATA = { eq: [], inv: [] };
        let USER = "";

        // FUNCIÓN CARGA DE DATOS
        async function sync() {
            const errBox = document.getElementById('error-box');
            try {
                const response = await fetch(URL_API);
                if (!response.ok) throw new Error("HTTP Error " + response.status);
                const json = await response.json();
                
                DATA.eq = json.eq;
                DATA.inv = json.inv;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            } catch (e) {
                document.getElementById('spinner').classList.add('hidden');
                errBox.classList.remove('hidden');
                errBox.innerText = "ERROR DE CONEXIÓN: " + e.message + "\n\nCausas probables:\n1. URL incorrecta.\n2. No activaste 'Cualquier persona' en el Script.\n3. Internet inestable.";
            }
        }

        function login(u) {
            USER = u;
            document.getElementById('user-display').innerText = u;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderDash();
        }

        function showTab(tab) {
            ['view-inventory', 'view-dash', 'view-mov'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
        }

        function searchInDB() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const row = DATA.inv.find(r => r[0] == q);
            const card = document.getElementById('res-card');

            if(row) {
                card.classList.remove('hidden');
                document.getElementById('res-codigo').innerText = row[0];
                document.getElementById('res-desc').innerText = row[1];
                document.getElementById('res-sis').innerText = row[3];
                document.getElementById('res-bod').innerText = row[4];
                document.getElementById('res-dif').innerText = row[5];
                document.getElementById('res-ub').innerText = "UBICACIÓN: " + row[6];
                document.getElementById('res-lote').innerText = "LOTE: " + row[7];
                
                const dbx = document.getElementById('res-dif-box');
                dbx.style.background = row[5] == 0 ? '#f0fdf4' : '#fef2f2';
                dbx.style.color = row[5] == 0 ? '#16a34a' : '#dc2626';
            } else {
                card.classList.add('hidden');
            }
        }

        function renderDash() {
            const list = document.getElementById('dash-list');
            list.innerHTML = "";
            const descuadrados = DATA.inv.filter((r, i) => i > 0 && r[5] != 0);

            descuadrados.forEach(r => {
                list.innerHTML += `
                    <div class="glass p-4 border-l-4 border-red-500 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm">${r[0]}</p>
                            <p class="text-[10px] text-gray-400">${r[1].substring(0,30)}...</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-red-600">${r[5]}</p>
                            <p class="text-[9px] font-bold">DIFERENCIA</p>
                        </div>
                    </div>
                `;
            });
        }

        function autoFill(val) {
            const p = DATA.eq.find(r => r[0] == val.toUpperCase());
            if(p) document.getElementById('m-des').value = p[1];
        }

        document.getElementById('mov-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const payload = {
                usuario: USER,
                codigo: document.getElementById('m-cod').value,
                descripcion: document.getElementById('m-des').value,
                tipo: document.getElementById('m-tipo').value,
                cantidad: document.getElementById('m-cant').value,
                lote: document.getElementById('m-lote').value,
                ub_ant: "", ub_nue: "", comentario: ""
            };

            await fetch(URL_API, { method: 'POST', body: JSON.stringify(payload) });
            alert("ˇMovimiento Guardado!");
            location.reload();
        }

        window.onload = sync;
    </script>
</body>
</html>
